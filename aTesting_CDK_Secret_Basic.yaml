apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: Testing_CDK_Secret_Basic
  title: Testing_CDK_Secret_Basic
  description: A template to test GitSync variables
spec:
  owner: deepesh.kumar@harness.io
  type: service
  parameters:
    - title: Fill in some steps
      properties:
        basic_auth_password_secret:
          title: basic_auth_password (Secret branch parity)
          type: string
          minLength: 4
          maxLength: 64
          pattern: ^[A-Z]{4}$
          ui:field: Secret
    - title: Step — Repeatable entries (maxItems 2) with per-item Secret
      required:
        - entries_multi
      properties:
        entries_multi:
          title: Multi entries (0–2 items)
          type: array
          minItems: 0
          maxItems: 2
          items:
            type: object
            required:
              - label
              - item_secret
            properties:
              label:
                title: Row label
                type: string
              item_secret:
                title: Per-row secret
                type: string
                minLength: 3
                maxLength: 32
                pattern: ^[A-Z]{4}$
                ui:field: Secret
  steps:
    - id: log
      name: Log parameters (smoke)
      action: debug:log
      input:
        message: CDK Secret pattern smoke completed {{}}
