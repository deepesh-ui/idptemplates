apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: custom-field-demo
  title: CustomField Extension Demo
  description: Demonstrates all CustomField field types with live API calls
spec:
  owner: team-idp
  type: service

  parameters:
    - title: Text Input Examples
      required:
        - projectName
        - userEmail
        - slugField
        - notesField
      properties:
        projectName:
          type: string
          title: Project Name
          ui:field: CustomField
          ui:options:
            fieldType: text
            title: Project Name
            placeholder: my-cool-service
            description: Must be kebab-case (lowercase letters, numbers, hyphens)
            validator: kebabCase
            debounceMs: 300

        userEmail:
          type: string
          title: User Email
          ui:field: CustomField
          ui:options:
            fieldType: text
            title: Email Address
            placeholder: you@company.com
            description: We'll validate this is a proper email
            validator: email
            debounceMs: 400

        slugField:
          type: string
          title: Slug
          ui:field: CustomField
          ui:options:
            fieldType: text
            title: URL Slug
            placeholder: my-service
            description: Only lowercase, numbers, and hyphens allowed
            regex:
              pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
              message: "Must be a valid URL slug (e.g. my-service-123)"
            debounceMs: 300

        notesField:
          type: string
          title: Notes
          ui:field: CustomField
          ui:options:
            fieldType: text
            title: Additional Notes
            placeholder: Describe your project requirements...
            description: Multi-line free-form text
            multiline: true

    - title: Dropdown Examples
      required:
        - environment
        - githubRepo
        - productCategory
        - dummyUser
        - multiRegion
      properties:
        environment:
          type: string
          title: Environment
          ui:field: CustomField
          ui:options:
            fieldType: dropdown
            title: Target Environment
            description: Where should this service be deployed?
            placeholder: Select environment...
            options:
              - label: Production
                value: prod
              - label: Staging
                value: staging
              - label: Development
                value: dev
              - label: QA
                value: qa

        githubRepo:
          type: string
          title: GitHub Repo
          ui:field: CustomField
          ui:options:
            fieldType: dropdown
            title: GitHub Repository (public repos from GitHub API)
            description: Fetches repos from the GitHub public API via proxy
            placeholder: Search for a repo...
            apiOptions:
              path: /api/proxy/github-api/orgs/backstage/repos
              method: GET
              params:
                per_page: "20"
                sort: updated
              arraySelector: ""
              valueSelector: full_name
              labelSelector: full_name

        productCategory:
          type: string
          title: Product Category
          ui:field: CustomField
          ui:options:
            fieldType: dropdown
            title: Product Category (from DummyJSON)
            description: Fetches product categories from dummyjson.com
            placeholder: Pick a category...
            apiOptions:
              path: /api/proxy/dummyjson/products/categories
              method: GET
              valueSelector: slug
              labelSelector: name

        dummyUser:
          type: string
          title: DummyJSON User
          ui:field: CustomField
          ui:options:
            fieldType: dropdown
            title: Assign to User (DummyJSON)
            description: Dynamic user list from dummyjson.com with search
            placeholder: Search users...
            apiOptions:
              path: /api/proxy/dummyjson/users
              method: GET
              params:
                limit: "15"
              arraySelector: users
              valueSelector: id
              labelSelector: firstName
              searchQueryParam: q
            setContextData:
              selectedUserEmail: email
              selectedUserName: firstName

        multiRegion:
          type: array
          title: Regions
          items:
            type: string
          ui:field: CustomField
          ui:options:
            fieldType: dropdown
            title: Deploy Regions
            description: Select one or more regions
            placeholder: Choose regions...
            multiSelect: true
            options:
              - label: US East (N. Virginia)
                value: us-east-1
              - label: US West (Oregon)
                value: us-west-2
              - label: EU West (Ireland)
                value: eu-west-1
              - label: AP South (Mumbai)
                value: ap-south-1

    - title: Button & JSON Examples
      required:
        - validateSetup
        - triggerAction
        - serviceConfig
        - yamlSnippet
      properties:
        validateSetup:
          type: string
          title: Validate
          ui:field: CustomField
          ui:options:
            fieldType: button
            title: Validate Project Setup
            description: Calls DummyJSON API to simulate a validation check
            buttonText: Run Validation
            buttonVariation: primary
            apiAction:
              path: /api/proxy/dummyjson/products/1
              method: GET
              successMessage: "Validation passed — project setup looks good!"
              errorMessage: "Validation failed — please check your inputs"
              responseTransform:
                validatedProduct: title
                validatedBrand: brand
            setContextData:
              productTitle: title
              productPrice: price

        triggerAction:
          type: string
          title: Create Resource
          ui:field: CustomField
          ui:options:
            fieldType: button
            title: Create a Test Resource
            description: POSTs to DummyJSON to simulate creating a resource
            buttonText: Create Resource
            buttonVariation: secondary
            apiAction:
              path: /api/proxy/dummyjson/products/add
              method: POST
              body:
                title: "{{ parameters.projectName }}"
                category: "{{ parameters.productCategory }}"
              successMessage: "Resource created successfully!"
              errorMessage: "Failed to create resource"

        serviceConfig:
          type: string
          title: Service Configuration
          ui:field: CustomField
          ui:options:
            fieldType: json
            title: Service Configuration (JSON)
            description: Paste or edit your service configuration object
            language: json
            editorHeight: "350px"
            defaultValue:
              name: my-service
              replicas: 3
              port: 8080
              env:
                NODE_ENV: production
                LOG_LEVEL: info
            jsonSchema:
              type: object
              required:
                - name
                - port
            setContextData:
              parsedConfig: ""

        yamlSnippet:
          type: string
          title: YAML Snippet
          ui:field: CustomField
          ui:options:
            fieldType: json
            title: Pipeline YAML Snippet
            description: Enter a YAML snippet (validated on submit)
            language: yaml
            editorHeight: "250px"
            defaultValue: |
              stages:
                - stage:
                    name: Build
                    type: CI
                    spec:
                      execution:
                        steps:
                          - step:
                              type: Run
                              name: Build App
                              spec:
                                command: npm run build

  steps:
    - id: log
      name: Log Parameters
      action: debug:log
      input:
        message: |
          Project: ${{ parameters.projectName }}
          Email: ${{ parameters.userEmail }}
          Env: ${{ parameters.environment }}
          Repo: ${{ parameters.githubRepo }}
          Category: ${{ parameters.productCategory }}
          Config: ${{ parameters.serviceConfig }}
